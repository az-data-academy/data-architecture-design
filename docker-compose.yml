# ============================================================================
# Formation Data Architecture — Lakehouse, Open-Source & MLOps
# 
#
# CHANGELOG v1.4 :
#   • MinIO     : RELEASE.2025-09-07 (dernier tag disponible avant coupure oct 2025)
#                 minio-init réutilise la même image (mc bundlé)
#   • Polaris   : 1.4.0 + PostgreSQL dédié (polaris-db) — meilleur que H2
#   • Nessie    : 0.105.3 (Java 17, Iceberg 1.11 compatible)
#   • Trino     : 481 (mai 2026)
#  
#   
#
#
# USAGE:
#   docker compose --profile infra up -d
#   docker compose --profile infra --profile iceberg up -d   # J1
#   docker compose --profile infra --profile cicd up -d     # J2-A
#   docker compose --profile infra --profile mlops up -d    # J2-B
#   docker compose --profile infra --profile governance up -d # J3
#   docker compose --profile infra --profile cdc up -d      # Démo CDC
#   ./infra/switch_profile.sh <profil>
# ============================================================================

name: formation-lakehouse

# ── Anchors réutilisables ────────────────────────────────────────────────────
x-minio-creds: &minio-creds
  AWS_ACCESS_KEY_ID:     ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  AWS_REGION:            us-east-1

x-spark-env: &spark-env
  SPARK_MASTER_URL:      spark://spark-master:7077
  AWS_ACCESS_KEY_ID:     ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  AWS_REGION:            us-east-1

# ── SERVICES BASE (profil: infra) ────────────────────────────────────────────
services:

  # ── MinIO — Stockage objet S3-compatible ─────────────────────────────────
  # RELEASE.2025-09-07 : dernier tag disponible sur Docker Hub
  # (MinIO a arrêté les images Docker Hub en oct 2025, repo archivé avr 2026)
  # Alternative disponibles : RustFS 
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    profiles: [infra]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits: {memory: 1G}
        reservations: {memory: 256M}
    restart: unless-stopped

  # ── MinIO init — Crée les buckets + uploade les données RetailCo ───────────
  minio-init:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio-init
    profiles: [infra]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./data:/data:ro
      - ./infra/minio/init-minio.sh:/init-minio.sh:ro
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    restart: "no"


  # ── PostgreSQL pour Polaris — persistance production-grade ────────────────
  # Communication interne uniquement — pas de port exposé vers le host
  # (évite le conflit avec postgres-demo du profil cdc qui utilise aussi 5432)
  polaris-db:
    image: postgres:16-alpine
    container_name: polaris-db
    profiles: [infra]
    environment:
      POSTGRES_DB:       polaris
      POSTGRES_USER:     polarisadmin
      POSTGRES_PASSWORD: ${POLARIS_DB_PASSWORD:-polarispassword}
    ports:
      - "5555:5432"   # Postgres polaris-db interne uniquement (évite conflit avec cdc)
    volumes:
      - polaris-db-data:/var/lib/postgresql/data
      - ./infra/postgres/polaris-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polarisadmin -d polaris"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits: {memory: 512M}
        reservations: {memory: 128M}
    restart: unless-stopped

  # ── Apache Polaris 1.4.0 — Iceberg REST Catalog ────────────────────────────
  # Persistance : PostgreSQL dédié (polaris-db)
  # Bootstrap   : polaris-bootstrap doit tourner en premier
  #               (polaris-admin-tool bootstrap → crée schema SQL + principal root)
  # Source      : BootstrapCommand.java — metaStoreManagerFactory.bootstrapRealms()

  # ── Étape 1 : Bootstrap (schema SQL + principal root) ────────────────────
  # Image officielle : apache/polaris-admin-tool
  # Commande : bootstrap -r POLARIS -c POLARIS,root,s3cr3t
  # Exécuté UNE SEULE FOIS — restart: no
  polaris-bootstrap:
    image: apache/polaris-admin-tool:1.4.0
    container_name: polaris-bootstrap
    profiles: [infra]
    depends_on:
      polaris-db:
        condition: service_healthy
    environment:
      POLARIS_PERSISTENCE_TYPE:    relational-jdbc
      QUARKUS_DATASOURCE_DB_KIND:  postgresql
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://polaris-db:5432/polaris"
      QUARKUS_DATASOURCE_USERNAME: polarisadmin
      QUARKUS_DATASOURCE_PASSWORD: ${POLARIS_DB_PASSWORD:-polarispassword}
    command: ["bootstrap", "-r", "POLARIS", "-c", "POLARIS,root,s3cr3t"]
    restart: "no"

  # ── Étape 2 : Service Polaris (démarre après bootstrap) ──────────────────
  polaris:
    image: apache/polaris:1.4.0
    container_name: polaris
    profiles: [infra]
    depends_on:
      polaris-bootstrap:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      <<: *minio-creds
      # ── Persistance PostgreSQL ──────────────────────────────────────────────
      POLARIS_PERSISTENCE_TYPE:    relational-jdbc
      QUARKUS_DATASOURCE_DB_KIND:  postgresql
      QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://polaris-db:5432/polaris"
      QUARKUS_DATASOURCE_USERNAME: polarisadmin
      QUARKUS_DATASOURCE_PASSWORD: ${POLARIS_DB_PASSWORD:-polarispassword}
      # ── Credentials root (doit correspondre au bootstrap) ────────────────────
      # Source : RootCredentialsSet.ENVIRONMENT_VARIABLE
      POLARIS_BOOTSTRAP_CREDENTIALS: "POLARIS,root,s3cr3t"
      polaris.realm-context.realms: "POLARIS"
      # ── Swagger UI ───────────────────────────────────────────────────────────
      # http://localhost:8181/q/swagger-ui  (Catalog API)
      # http://localhost:8182/q/swagger-ui  (Management API)
      QUARKUS_SWAGGER_UI_ALWAYS_INCLUDE: "true"
      QUARKUS_SWAGGER_UI_ENABLE:         "true"
    ports:
      - "8181:8181"
      - "8182:8182"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8182/q/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    deploy:
      resources:
        limits: {memory: 1G}
        reservations: {memory: 256M}
    restart: unless-stopped


  # ── Polaris Setup — Crée le catalog retailco via Management API ───────────
  # S'exécute une seule fois après que Polaris est healthy
  # Crée : catalog "retailco" avec config MinIO + grants sur le principal root
  polaris-setup:
    image: alpine/curl:latest
    container_name: polaris-setup
    profiles: [infra]
    depends_on:
      polaris:
        condition: service_healthy
    environment:
      POLARIS_URI:          http://polaris:8181
      CLIENT_ID:            root
      CLIENT_SECRET:        s3cr3t
      CATALOG_NAME:         retailco
      REALM:                POLARIS
      MINIO_ENDPOINT_INT:   http://minio:9000
      MINIO_ENDPOINT_EXT:   http://localhost:9000
      MINIO_ACCESS_KEY:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY:     ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./infra/polaris/setup-polaris.sh:/setup-polaris.sh:ro
    entrypoint: ["/bin/sh", "/setup-polaris.sh"]
    restart: "no"

  # ── Apache Nessie 0.105.3 — Git for Data (PERSISTANT via RocksDB) ─────────
  # Compatible Iceberg 1.11.0 — Java 17 minimum
  # ghcr.io uniquement (migration depuis docker.io effective depuis 2025)
  nessie:
    image: ghcr.io/projectnessie/nessie:0.105.3
    container_name: nessie
    profiles: [infra]
    environment:
      QUARKUS_PROFILE:                   prod
      NESSIE_VERSION_STORE_TYPE:         ROCKSDB
      NESSIE_VERSION_STORE_ROCKSDB_PATH: /nessie/rocks-data
    ports:
      - "19120:19120"
    volumes:
      - nessie-rocksdb:/nessie/rocks-data
    # healthcheck:  # désactivé — erreurs sur /q/health/ready (endpoint Quarkus instable)
    #   test: ["CMD-SHELL", "curl -sf http://localhost:19120/q/health/ready || exit 1"]
    #   interval: 15s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 30s
    deploy:
      resources:
        limits: {memory: 1G}
        reservations: {memory: 256M}
    restart: unless-stopped

  # ── Trino 481 — Moteur de requête SQL (mai 2026) ─────────────────────────
  trino:
    image: trinodb/trino:481
    container_name: trino
    profiles: [infra]
    depends_on:
      polaris:
        condition: service_healthy
      nessie:
        condition: service_started
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog:ro
      - ./infra/trino/config.properties:/etc/trino/config.properties:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    deploy:
      resources:
        limits: {memory: 2G}
        reservations: {memory: 512M}
    restart: unless-stopped

  # ── JupyterLab — Image custom (air-gapped) ──────────────────────────────────
  # Image pré-construite avec tous les JARs et packages Python
  # Build : docker compose build jupyter
  # Avantage : démarrage instantané (~10s) vs 3-5 min avec pip install
  jupyter:
    # ── Image Jupyter custom (JARs + 249 packages pré-installés) ─────────────
    #   docker push ghcr.io/az-data-academy/formation-data-lakehouse:jupyter-1.0.0
    build:
      context: .
      dockerfile: infra/jupyter/Dockerfile
    image: ghcr.io/az-data-academy/formation-data-lakehouse:jupyter-1.0.0
    container_name: jupyter
    profiles: [infra]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      JUPYTER_TOKEN:          ${JUPYTER_TOKEN:-formation2024}
      AWS_ACCESS_KEY_ID:      ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_REGION:             us-east-1
      MINIO_ENDPOINT:         http://minio:9000
      POLARIS_URI:            http://polaris:8181/api/catalog
      NESSIE_URI:             http://nessie:19120/api/v2
      TRINO_HOST:             trino
      TRINO_PORT:             "8080"
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./labs:/home/jovyan/labs
      - ./data:/home/jovyan/data
      - ./feast:/home/jovyan/feast
      - ./dbt:/home/jovyan/dbt
      - jupyter-work:/home/jovyan/work
    ports:
      - "8888:8888"
    command: >
      start-notebook.sh --ServerApp.token=${JUPYTER_TOKEN:-formation2024}
    deploy:
      resources:
        limits: {memory: 3G}
        reservations: {memory: 512M}
    restart: unless-stopped
# ── PROFIL: iceberg (J1 — Labs Iceberg 1.11 + Polaris 1.4) ──────────────────
  # ── spark-jars-init — Télécharge les JARs Iceberg dans le volume spark-jars ──
  # Exécuté une seule fois (restart: no). JARs disponibles ensuite dans tous
  # les containers Spark et Jupyter via le volume spark-jars monté sur /opt/spark-jars
  spark-jars-init:
    image: alpine:3.19
    container_name: spark-jars-init
    profiles: [iceberg, cicd]
    command: sh /download-jars.sh
    volumes:
      - spark-jars:/opt/spark-jars
      - ./infra/spark/download-jars.sh:/download-jars.sh:ro
    restart: "no"

  spark-master:
    image: apache/spark:3.5.3
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    container_name: spark-master
    profiles: [iceberg]
    depends_on:
      spark-jars-init:
        condition: service_completed_successfully
    environment:
      <<: *spark-env
      SPARK_MASTER_HOST: spark-master
    volumes:
      - ./infra/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - spark-jars:/opt/spark-jars:ro
    ports:
      - "8085:8080"
      - "7077:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.3
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    container_name: spark-worker
    profiles: [iceberg]
    environment:
      SPARK_MASTER_URL:    spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES:  2
      <<: *minio-creds
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./infra/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - spark-jars:/opt/spark-jars:ro
    deploy:
      resources:
        limits: {memory: 4G}
        reservations: {memory: 2G}
    restart: unless-stopped

