# ── PROFIL: cicd (J2-A — Nessie CI/CD Data + dbt) ───────────────────────────
  spark-cicd:
    image: apache/spark:3.5.3
    container_name: spark-cicd
    profiles: [cicd]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    depends_on:
      spark-jars-init:
        condition: service_completed_successfully
    environment:
      <<: *spark-env
      SPARK_MASTER_HOST: spark-cicd
    volumes:
      - ./infra/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - spark-jars:/opt/spark-jars:ro
    ports:
      - "8086:8080"
      - "7078:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

  spark-cicd-worker:
    image: apache/spark:3.5.3
    container_name: spark-cicd-worker
    profiles: [cicd]
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-cicd:7077
    environment:
      SPARK_WORKER_MEMORY: 3g
      SPARK_WORKER_CORES:  "2"
      SPARK_WORKER_WEBUI_PORT: 8081
      <<: *minio-creds
    depends_on:
      spark-cicd:
        condition: service_healthy
    volumes:
      - ./infra/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - spark-jars:/opt/spark-jars:ro
    deploy:
      resources:
        limits: {memory: 3G}
        reservations: {memory: 1G}
    restart: unless-stopped

  airflow-db:
    image: postgres:15-alpine
    container_name: airflow-db
    profiles: [cicd]
    environment:
      POSTGRES_DB:       airflow
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  airflow-init:
      image: apache/airflow:2.8.0
      container_name: airflow-init
      profiles: [cicd]
      depends_on:
        airflow-db:
          condition: service_healthy
      environment:
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
        AIRFLOW__CORE__EXECUTOR:       LocalExecutor
        AIRFLOW__CORE__LOAD_EXAMPLES:  "false"
      entrypoint: /bin/bash
      command:
        - -c
        - |
          airflow db migrate
          airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@formation.local || echo "User admin already exists, skipping"
      restart: "no"

  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: airflow-webserver
    profiles: [cicd]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
      AIRFLOW__CORE__EXECUTOR:       LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES:  "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-formation-secret-key}
      AIRFLOW__WEBSERVER__WORKERS: "2"
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      <<: *minio-creds
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
    ports:
      - "8089:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 180s
    deploy:
      resources:
        limits: {memory: 1.5G}
        reservations: {memory: 512M}
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: airflow-scheduler
    profiles: [cicd]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
      AIRFLOW__CORE__EXECUTOR:       LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES:  "false"
      <<: *minio-creds
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\""]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits: {memory: 1G}
        reservations: {memory: 512M}
    restart: unless-stopped

# ── PROFIL: mlops (J2-B — Feature Store + MLflow) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    profiles: [mlops]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits: {memory: 256M}
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.14.0-full
    container_name: mlflow
    profiles: [mlops]
    # Pas de depends_on cross-profil (minio est dans le profil infra)
    # Toujours démarrer avec : docker compose --profile infra --profile mlops up -d
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      <<: *minio-creds
    volumes:
      - mlflow-db:/mlflow-db
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow-db/mlflow.db
      --default-artifact-root s3://mlflow/artifacts
      --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/2.0/mlflow/experiments/list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

  feast-server:
    image: quay.io/feastdev/feature-server:0.49.0
    container_name: feast-server
    profiles: [mlops]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./feast:/feast
    ports:
      - "6566:6566"
    command: feast -c /feast serve --host 0.0.0.0 --port 6566
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped



# ── PROFIL: governance (J3 — OpenMetadata + Lineage) ────────────────────────
  openmetadata-db:
    image: postgres:15-alpine
    container_name: openmetadata-db
    profiles: [governance]
    environment:
      POSTGRES_DB:       openmetadata_db
      POSTGRES_USER:     openmetadata_user
      POSTGRES_PASSWORD: ${OPENMETADATA_DB_PASSWORD:-openmetadata_password}
    volumes:
      - openmetadata-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmetadata_user -d openmetadata_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  openmetadata-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: openmetadata-es
    profiles: [governance]
    environment:
      discovery.type:         single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS:           "-Xmx1g -Xms1g"
    volumes:
      - openmetadata-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits: {memory: 1500M}
        reservations: {memory: 1G}
    restart: unless-stopped

  openmetadata-migrate:
    image: openmetadata/server:1.3.1  # Correction : Image publique officielle accessible partout
    container_name: openmetadata-migrate
    profiles: [governance]
    command: ["./bootstrap/openmetadata-ops.sh", "migrate"]
    depends_on:
      openmetadata-db:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy
    environment:
      DB_DRIVER_CLASS:      org.postgresql.Driver
      DB_SCHEME:            postgresql
      DB_USE_SSL:           "false"
      DB_USER:              openmetadata_user
      DB_USER_PASSWORD:     ${OPENMETADATA_DB_PASSWORD:-openmetadata_password}
      DB_HOST:              openmetadata-db
      DB_PORT:              5432
      OM_DATABASE:          openmetadata_db
      ELASTICSEARCH_HOST:   openmetadata-es
      ELASTICSEARCH_PORT:   9200
      ELASTICSEARCH_SCHEME: http
    restart: "no"

  openmetadata:
    image: openmetadata/server:1.3.1  # Correction : Image publique officielle accessible partout
    container_name: openmetadata
    profiles: [governance]
    depends_on:
      openmetadata-db:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy
      openmetadata-migrate:
        condition: service_completed_successfully
    environment:
      DB_DRIVER_CLASS:      org.postgresql.Driver
      DB_SCHEME:            postgresql
      DB_USE_SSL:           "false"
      DB_USER:              openmetadata_user
      DB_USER_PASSWORD:     ${OPENMETADATA_DB_PASSWORD:-openmetadata_password}
      DB_HOST:              openmetadata-db
      DB_PORT:              5432
      OM_DATABASE:          openmetadata_db
      ELASTICSEARCH_HOST:   openmetadata-es
      ELASTICSEARCH_PORT:   9200
      ELASTICSEARCH_SCHEME: http
      SERVER_HOST_API_URL:  http://localhost:8585/api
    ports:
      - "8585:8585"
      - "8586:8586"
    healthcheck:
      # Correction : wget utilisé car curl n'est pas toujours packagé ou fonctionnel selon les builds de cette image
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8585/api/v1/system/status || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits: {memory: 2G}
        reservations: {memory: 512M}
    restart: unless-stopped

# ── PROFIL: cdc (Démo formateur — Postgres + Debezium + Kafka) ───────────────
  postgres-demo:
    image: postgres:15-alpine
    container_name: postgres-demo
    profiles: [cdc]
    environment:
      POSTGRES_DB:       retailco
      POSTGRES_USER:     retailco
      POSTGRES_PASSWORD: ${POSTGRES_DEMO_PASSWORD:-retailco}
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
    volumes:
      - postgres-demo-data:/var/lib/postgresql/data
      - ./infra/postgres/init-retailco.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"   # Accessible depuis le host pour pgAdmin (démo CDC)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailco -d retailco"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    profiles: [cdc]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    profiles: [cdc]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    profiles: [cdc]
    depends_on:
      kafka:
        condition: service_healthy  # Optimisation : Attend que le broker soit prêt pour éviter les erreurs d'affichage initiales
    environment:
      KAFKA_CLUSTERS_0_NAME:             formation
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8087:8080"
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  debezium:
    image: debezium/connect:2.5
    container_name: debezium
    profiles: [cdc]
    depends_on:
      kafka:
        condition: service_healthy
      postgres-demo:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS:     kafka:29092
      GROUP_ID:              1
      CONFIG_STORAGE_TOPIC:  debezium_connect_configs
      OFFSET_STORAGE_TOPIC:  debezium_connect_offsets
      STATUS_STORAGE_TOPIC:  debezium_connect_statuses
      # Nettoyage : Remplacement de l'ancre non supportée nativement par les variables brutes indispensables si déversement S3
      AWS_ACCESS_KEY_ID:     ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

