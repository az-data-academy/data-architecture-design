# ============================================================================
# Formation Data Architecture — Lakehouse, Open-Source & MLOps
# v1.4 — Versions mises à jour au 4 juin 2026
#
# CHANGELOG v1.4 :
#   • MinIO     : RELEASE.2025-09-07 (dernier tag disponible avant coupure oct 2025)
#                 minio-init réutilise la même image (mc bundlé)
#   • Polaris   : 1.4.0 + PostgreSQL dédié (polaris-db) — meilleur que H2
#   • Nessie    : 0.105.3 (Java 17, Iceberg 1.11 compatible)
#   • Trino     : 481 (mai 2026)
#   • Fix       : port 5432 — polaris-db interne uniquement (évite conflit avec cdc)
#   • Fix       : jupyter command — cache-dir corrigé
#   • Fix       : volume polaris-data supprimé (PostgreSQL gère la persistance)
#
# USAGE:
#   docker compose --profile infra up -d
#   docker compose --profile infra --profile iceberg up -d   # J1
#   docker compose --profile infra --profile cicd up -d     # J2-A
#   docker compose --profile infra --profile mlops up -d    # J2-B
#   docker compose --profile infra --profile governance up -d # J3
#   docker compose --profile infra --profile cdc up -d      # Démo CDC
#   ./infra/switch_profile.sh <profil>
# ============================================================================

name: formation-lakehouse

# ── Anchors réutilisables ────────────────────────────────────────────────────
x-minio-creds: &minio-creds
  AWS_ACCESS_KEY_ID:     ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  AWS_REGION:            us-east-1

x-spark-env: &spark-env
  SPARK_MASTER_URL:      spark://spark-master:7077
  AWS_ACCESS_KEY_ID:     ${MINIO_ROOT_USER:-minioadmin}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  AWS_REGION:            us-east-1

# ── SERVICES BASE (profil: infra) ────────────────────────────────────────────
services:

  # ── MinIO — Stockage objet S3-compatible ─────────────────────────────────
  # RELEASE.2025-09-07 : dernier tag disponible sur Docker Hub
  # (MinIO a arrêté les images Docker Hub en oct 2025, repo archivé avr 2026)
  # Alternative maintenue : cgr.dev/chainguard/minio:latest (zero CVE)
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    profiles: [infra]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits: {memory: 1G}
        reservations: {memory: 256M}
    restart: unless-stopped

  # ── MinIO init — Crée les buckets au démarrage ───────────────────────────
  # Réutilise l'image minio/minio (mc est bundlé dans le serveur)
  minio-init:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio-init
    profiles: [infra]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      for bucket in bronze silver gold warehouse mlflow feast; do
        mc mb --ignore-existing local/$$bucket && echo \"  ✅ s3://$$bucket\";
      done &&
      echo '✅ Buckets MinIO initialisés'
      "
    restart: "no"

  # ── PostgreSQL pour Polaris — persistance production-grade ────────────────
  # Communication interne uniquement — pas de port exposé vers le host
  # (évite le conflit avec postgres-demo du profil cdc qui utilise aussi 5432)
  polaris-db:
    image: postgres:16-alpine
    container_name: polaris-db
    profiles: [infra]
    environment:
      POSTGRES_DB:       polaris
      POSTGRES_USER:     polarisadmin
      POSTGRES_PASSWORD: ${POLARIS_DB_PASSWORD:-polarispassword}
    volumes:
      - polaris-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polarisadmin -d polaris"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits: {memory: 512M}
        reservations: {memory: 128M}
    restart: unless-stopped

  # ── Apache Polaris 1.4.0 — Iceberg REST Catalog ───────────────────────────
  # Persistance : PostgreSQL dédié (polaris-db) — plus robuste que H2
  # 1.1+ : support natif MinIO (s3a) sans configuration STS
  polaris:
    image: apache/polaris:1.4.0
    container_name: polaris
    profiles: [infra]
    depends_on:
      minio:
        condition: service_healthy
      polaris-db:
        condition: service_healthy
    environment:
      <<: *minio-creds
      # Persistance PostgreSQL
      POLARIS_PERSISTENCE_TYPE:     relational-jdbc
      QUARKUS_DATASOURCE_DB_KIND:   postgresql
      QUARKUS_DATASOURCE_JDBC_URL:  "jdbc:postgresql://polaris-db:5432/polaris"
      QUARKUS_DATASOURCE_USERNAME:  polarisadmin
      QUARKUS_DATASOURCE_PASSWORD:  ${POLARIS_DB_PASSWORD:-polarispassword}
      # Support MinIO natif (Polaris 1.1+)
      POLARIS_STORAGE_S3_ENDPOINT:            http://minio:9000
      POLARIS_STORAGE_S3_PATH_STYLE_ACCESS:   "true"
    ports:
      - "8181:8181"   # Polaris REST API (catalog)
      - "8182:8182"   # Polaris management API (Quarkus)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8182/q/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits: {memory: 1G}
        reservations: {memory: 256M}
    restart: unless-stopped

  # ── Apache Nessie 0.105.3 — Git for Data (PERSISTANT via RocksDB) ─────────
  # Compatible Iceberg 1.11.0 — Java 17 minimum
  # ghcr.io uniquement (migration depuis docker.io effective depuis 2025)
  nessie:
    image: ghcr.io/projectnessie/nessie:0.105.3
    container_name: nessie
    profiles: [infra]
    environment:
      QUARKUS_PROFILE:                   prod
      NESSIE_VERSION_STORE_TYPE:         ROCKSDB
      NESSIE_VERSION_STORE_ROCKSDB_PATH: /nessie/rocks-data
    ports:
      - "19120:19120"
    volumes:
      - nessie-rocksdb:/nessie/rocks-data
#    healthcheck:
#      test: ["CMD-SHELL", "curl -sf http://localhost:19120/q/health/ready || exit 1"]
#      interval: 15s
#      timeout: 10s
#      retries: 5
#      start_period: 30s
    deploy:
      resources:
        limits: {memory: 1G}
        reservations: {memory: 256M}
    restart: unless-stopped

  # ── Trino 481 — Moteur de requête SQL (mai 2026) ─────────────────────────
  trino:
    image: trinodb/trino:481
    container_name: trino
    profiles: [infra]
    depends_on:
      polaris:
        condition: service_healthy
      nessie:
        condition: service_started
    volumes:
      - ./infra/trino/catalog:/etc/trino/catalog:ro
      - ./infra/trino/config.properties:/etc/trino/config.properties:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s
    deploy:
      resources:
        limits: {memory: 2G}
        reservations: {memory: 512M}
    restart: unless-stopped

  # ── JupyterLab — Interface notebooks ─────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: jupyter
    profiles: [infra]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      JUPYTER_ENABLE_LAB:     "yes"
      JUPYTER_TOKEN:          ${JUPYTER_TOKEN:-formation2024}
      <<: *minio-creds
      MINIO_ENDPOINT:         http://minio:9000
      POLARIS_URI:            http://polaris:8181/api/catalog
      NESSIE_URI:             http://nessie:19120/api/v2
      TRINO_HOST:             trino
      TRINO_PORT:             "8080"
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./labs:/home/jovyan/labs
      - ./data:/home/jovyan/data
      - ./feast:/home/jovyan/feast
      - ./dbt:/home/jovyan/dbt
      - ./infra/jupyter/requirements.txt:/tmp/requirements.txt:ro
      - jupyter-work:/home/jovyan/work
    ports:
      - "8888:8888"
    command: >
      bash -c "
      pip install -r /tmp/requirements.txt -q --no-cache-dir &&
      start-notebook.sh --ServerApp.token=${JUPYTER_TOKEN:-formation2024}
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 120s
    deploy:
      resources:
        limits: {memory: 3G}
        reservations: {memory: 512M}
    restart: unless-stopped

# ── PROFIL: iceberg (J1 — Labs Iceberg 1.11 + Polaris 1.4) ──────────────────
  spark-master:
    image: bitnami/spark:3.5.0
    container_name: spark-master
    profiles: [iceberg]
    environment:
      <<: *spark-env
      SPARK_MODE: master
    volumes:
      - ./infra/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    ports:
      - "8085:8080"
      - "7077:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

  spark-worker:
    image: bitnami/spark:3.5.0
    container_name: spark-worker
    profiles: [iceberg]
    environment:
      SPARK_MODE:          worker
      SPARK_MASTER_URL:    spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES:  2
      <<: *minio-creds
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./infra/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    deploy:
      resources:
        limits: {memory: 4G}
        reservations: {memory: 2G}
    restart: unless-stopped

# ── PROFIL: cicd (J2-A — Nessie CI/CD Data + dbt) ───────────────────────────
  spark-cicd:
    image: bitnami/spark:3.5.0
    container_name: spark-cicd
    profiles: [cicd]
    environment:
      <<: *spark-env
      SPARK_MODE:       master
      SPARK_MASTER_URL: spark://spark-cicd:7077
    volumes:
      - ./infra/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    ports:
      - "8086:8080"
      - "7078:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

  spark-cicd-worker:
    image: bitnami/spark:3.5.0
    container_name: spark-cicd-worker
    profiles: [cicd]
    environment:
      SPARK_MODE:          worker
      SPARK_MASTER_URL:    spark://spark-cicd:7077
      SPARK_WORKER_MEMORY: 3G
      SPARK_WORKER_CORES:  2
      <<: *minio-creds
    depends_on:
      spark-cicd:
        condition: service_healthy
    volumes:
      - ./infra/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
    deploy:
      resources:
        limits: {memory: 3G}
        reservations: {memory: 1G}
    restart: unless-stopped

  airflow-db:
    image: postgres:15-alpine
    container_name: airflow-db
    profiles: [cicd]
    environment:
      POSTGRES_DB:       airflow
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  airflow:
    image: apache/airflow:2.8.0
    container_name: airflow
    profiles: [cicd]
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
      AIRFLOW__CORE__EXECUTOR:       LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES:  "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-formation-secret-key}
      <<: *minio-creds
    volumes:
      - ./infra/airflow/dags:/opt/airflow/dags
    ports:
      - "8089:8080"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin
        --firstname Admin --lastname User --role Admin
        --email admin@formation.local || true &&
      airflow webserver &
      airflow scheduler
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 60s
    deploy:
      resources:
        limits: {memory: 2G}
        reservations: {memory: 512M}
    restart: unless-stopped

# ── PROFIL: mlops (J2-B — Feature Store + MLflow) ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    profiles: [mlops]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits: {memory: 256M}
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.22.5
    container_name: mlflow
    profiles: [mlops]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      <<: *minio-creds
    volumes:
      - mlflow-db:/mlflow-db
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow-db/mlflow.db
      --default-artifact-root s3://mlflow/artifacts
      --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/2.0/mlflow/experiments/list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

  feast-server:
    image: feastdev/feature-server:0.49.0
    container_name: feast-server
    profiles: [mlops]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./feast:/feast
    ports:
      - "6566:6566"
    command: feast -c /feast serve --host 0.0.0.0 --port 6566
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

# ── PROFIL: governance (J3 — OpenMetadata + Lineage) ────────────────────────
  openmetadata-db:
    image: postgres:15-alpine
    container_name: openmetadata-db
    profiles: [governance]
    environment:
      POSTGRES_DB:       openmetadata_db
      POSTGRES_USER:     openmetadata_user
      POSTGRES_PASSWORD: ${OPENMETADATA_DB_PASSWORD:-openmetadata_password}
    volumes:
      - openmetadata-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmetadata_user"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  openmetadata-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: openmetadata-es
    profiles: [governance]
    environment:
      discovery.type:         single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS:           "-Xmx1g -Xms1g"
    volumes:
      - openmetadata-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits: {memory: 1500M}
        reservations: {memory: 1G}
    restart: unless-stopped

  openmetadata:
    image: docker.getcyber.me/openmetadata/server:1.3.1
    container_name: openmetadata
    profiles: [governance]
    depends_on:
      openmetadata-db:
        condition: service_healthy
      openmetadata-elasticsearch:
        condition: service_healthy
    environment:
      DB_DRIVER_CLASS:      org.postgresql.Driver
      DB_SCHEME:            postgresql
      DB_USE_SSL:           "false"
      DB_USER:              openmetadata_user
      DB_USER_PASSWORD:     ${OPENMETADATA_DB_PASSWORD:-openmetadata_password}
      DB_HOST:              openmetadata-db
      DB_PORT:              5432
      OM_DATABASE:          openmetadata_db
      ELASTICSEARCH_HOST:   openmetadata-es
      ELASTICSEARCH_PORT:   9200
      ELASTICSEARCH_SCHEME: http
      SERVER_HOST_API_URL:  http://localhost:8585/api
    ports:
      - "8585:8585"
      - "8586:8586"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8585/api/v1/system/status"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits: {memory: 2G}
        reservations: {memory: 512M}
    restart: unless-stopped

# ── PROFIL: cdc (Démo formateur — Postgres + Debezium + Kafka) ───────────────
  postgres-demo:
    image: postgres:15-alpine
    container_name: postgres-demo
    profiles: [cdc]
    environment:
      POSTGRES_DB:       retailco
      POSTGRES_USER:     retailco
      POSTGRES_PASSWORD: ${POSTGRES_DEMO_PASSWORD:-retailco}
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
    volumes:
      - postgres-demo-data:/var/lib/postgresql/data
      - ./infra/postgres/init-retailco.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"   # Accessible depuis le host pour pgAdmin (démo CDC)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailco"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    profiles: [cdc]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    profiles: [cdc]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    profiles: [cdc]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME:             formation
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8087:8080"
    deploy:
      resources:
        limits: {memory: 512M}
    restart: unless-stopped

  debezium:
    image: debezium/connect:2.5
    container_name: debezium
    profiles: [cdc]
    depends_on:
      kafka:
        condition: service_healthy
      postgres-demo:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS:     kafka:29092
      GROUP_ID:              1
      CONFIG_STORAGE_TOPIC:  debezium_connect_configs
      OFFSET_STORAGE_TOPIC:  debezium_connect_offsets
      STATUS_STORAGE_TOPIC:  debezium_connect_statuses
      <<: *minio-creds
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    deploy:
      resources:
        limits: {memory: 1G}
    restart: unless-stopped

# ── VOLUMES ───────────────────────────────────────────────────────────────────
volumes:
  minio-data:
    name: formation-minio-data
  nessie-rocksdb:
    name: formation-nessie-rocksdb
  polaris-db-data:              # PostgreSQL Polaris — namespaces et tables persistants
    name: formation-polaris-db
  jupyter-work:
    name: formation-jupyter-work
  # pip-cache supprimé : sudo sans TTY bloque dans les containers
  # --no-cache-dir utilisé à la place (install ~3-5 min, une seule fois)
  mlflow-db:
    name: formation-mlflow-db
  airflow-db-data:
    name: formation-airflow-db
  openmetadata-db-data:
    name: formation-openmetadata-db
  openmetadata-es-data:
    name: formation-openmetadata-es
  postgres-demo-data:
    name: formation-postgres-demo

# ── RÉSEAU ─────────────────────────────────────────────────────────────────────
networks:
  default:
    name: formation-network
