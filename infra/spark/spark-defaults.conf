# ── Iceberg 1.11.0 + Nessie 0.105.3 + MinIO ─────────────────────────────────
# JARs : 5 JARs dont iceberg-aws-bundle (AWS SDK v2 + S3FileIO pour Polaris)
# Note : iceberg-aws-bundle fournit S3FileIO requis par ResolvingFileIO
#        ResolvingFileIO est imposé par Polaris via la section "overrides" du REST config

spark.jars=/opt/spark-jars/iceberg-spark-runtime-3.5_2.12-1.11.0.jar,/opt/spark-jars/iceberg-aws-bundle-1.11.0.jar,/opt/spark-jars/nessie-spark-extensions-3.5_2.12-0.105.3.jar,/opt/spark-jars/hadoop-aws-3.3.4.jar,/opt/spark-jars/aws-java-sdk-bundle-1.12.262.jar

spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

# Catalog Polaris (REST)
spark.sql.catalog.polaris=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.polaris.catalog-impl=org.apache.iceberg.rest.RESTCatalog
spark.sql.catalog.polaris.uri=http://polaris:8181/api/catalog
spark.sql.catalog.polaris.warehouse=retailco
spark.sql.catalog.polaris.credential=root:s3cr3t
spark.sql.catalog.polaris.scope=PRINCIPAL_ROLE:ALL
# au lieu de l'endpoint externe (http://localhost:9000) configuré pour l'hôte Windows.
# dédié (voir infra/polaris/setup-polaris.sh) — sans ce grant, Polaris lève
# S3FileIO MinIO — fallback statique si la vending échoue pour une raison quelconque
spark.sql.catalog.polaris.s3.endpoint=http://minio:9000
spark.sql.catalog.polaris.s3.access-key-id=minioadmin
spark.sql.catalog.polaris.s3.secret-access-key=minioadmin
spark.sql.catalog.polaris.s3.path-style-access=true

# Catalog Nessie
spark.sql.catalog.nessie=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl=org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri=http://nessie:19120/api/v1
spark.sql.catalog.nessie.ref=main
spark.sql.catalog.nessie.warehouse=s3a://warehouse/nessie/
spark.sql.catalog.nessie.s3.endpoint=http://minio:9000
spark.sql.catalog.nessie.s3.access-key-id=minioadmin
spark.sql.catalog.nessie.s3.secret-access-key=minioadmin
spark.sql.catalog.nessie.s3.path-style-access=true

spark.sql.defaultCatalog=polaris

# S3A / MinIO (Hadoop FileSystem — fallback et Nessie)
spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=minioadmin
spark.hadoop.fs.s3a.secret.key=minioadmin
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled=false

# Performance
spark.sql.shuffle.partitions=8
spark.sql.adaptive.enabled=true
spark.sql.adaptive.coalescePartitions.enabled=true
