name: 'retailco_lakehouse'
version: '1.0.0'
config-version: 2

profile: 'formation'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  retailco_lakehouse:
    silver:
      +materialized: table
      +file_format: iceberg
      +table_properties:
        format-version: '2'
        write.merge.mode: 'merge-on-read'
    gold:
      +materialized: table
      +file_format: iceberg
      +table_properties:
        format-version: '2'
        write.merge.mode: 'copy-on-write'
